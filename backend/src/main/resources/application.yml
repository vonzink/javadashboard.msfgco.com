server:
  port: 8083

spring:
  application:
    name: msfg-dashboard
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3308}/${DB_NAME:msfg_dashboard}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:msfg_user}
    password: ${DB_PASSWORD:msfg_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-at-least-64-characters-long}
    expiration-ms: 86400000    # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-file-size: 5242880  # 5MB
  encryption:
    key: ${ENCRYPTION_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

logging:
  level:
    com.msfg.dashboard: DEBUG
    org.springframework.security: INFO
